services:
  postgres-test:
    image: postgres:16-alpine
    container_name: sylvara-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sylvara_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sylvara_test"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - sylvara_test_pgdata:/var/lib/postgresql/data

volumes:
  sylvara_test_pgdata:
